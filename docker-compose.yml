version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reviewer_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./storage/code_reviewer.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    volumes:
      - backend_storage:/app/storage

  chromadb:
    image: chromadb/chroma:latest
    container_name: reviewer_chromadb
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - chroma_data:/chroma/data

volumes:
  backend_storage:
  chroma_data:
